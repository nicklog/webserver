name: Create and publish a Docker image

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.set.outputs.include }}
      image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
    steps:
      - name: Generate build matrix
        id: set
        uses: actions/github-script@v7
        with:
          script: |
            const phpVersions = ['8.4', '8.5'];
            const nodeMajors = ['24', '26'];
            const pnpmVersions = ['10', '11'];
            const lastPhp = phpVersions[phpVersions.length - 1];
            const lastNode = nodeMajors[nodeMajors.length - 1];
            const lastPnpm = pnpmVersions[pnpmVersions.length - 1];
            const include = [];

            for (const php of phpVersions) {
              const tags = [`php${php}`];
              if (php === lastPhp) tags.push('latest');
              include.push({
                name: `prod-php${php}`,
                target: 'prod',
                build_args: `PHP_VERSION=${php}`,
                cache_scope: `prod-php${php}`,
                tags: tags.map(t => `type=raw,value=${t}`).join('\n'),
              });
            }

            for (const php of phpVersions) {
              for (const node of nodeMajors) {
                for (const pnpm of pnpmVersions) {
                  const tags = [`php${php}-node${node}-pnpm${pnpm}-dev`];
                  if (pnpm === lastPnpm) tags.push(`php${php}-node${node}-dev`);
                  if (node === lastNode && pnpm === lastPnpm) tags.push(`php${php}-dev`);
                  if (php === lastPhp && node === lastNode && pnpm === lastPnpm) tags.push('latest-dev');
                  include.push({
                    name: `dev-php${php}-node${node}-pnpm${pnpm}`,
                    target: 'dev',
                    build_args: [
                      `PHP_VERSION=${php}`,
                      `NODE_MAJOR=${node}`,
                      `PNPM_VERSION=latest-${pnpm}`,
                    ].join('\n'),
                    cache_scope: `dev-php${php}-node${node}-pnpm${pnpm}`,
                    tags: tags.map(t => `type=raw,value=${t}`).join('\n'),
                  });
                }
              }
            }

            core.setOutput('include', JSON.stringify(include));

  build:
    name: Build ${{ matrix.name }}
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.include) }}

    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      id-token: write
      packages: write
    with:
      output: image
      push: true
      platforms: linux/amd64,linux/arm64
      target: ${{ matrix.target }}
      build-args: ${{ matrix.build_args }}
      cache: true
      cache-mode: max
      cache-scope: ${{ matrix.cache_scope }}
      meta-images: ${{ needs.matrix.outputs.image }}
      meta-tags: ${{ matrix.tags }}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
