name: Create and publish a Docker image

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Production
          - name: prod-php8.4
            target: prod
            build-args: |
              PHP_VERSION=8.4
            cache-scope: prod-php8.4
            tags: |
              type=raw,value=php8.4

          - name: prod-php8.5
            target: prod
            build-args: |
              PHP_VERSION=8.5
            cache-scope: prod-php8.5
            tags: |
              type=raw,value=php8.5
              type=raw,value=latest

          # Development PHP 8.4
          - name: dev-php8.4-node24-pnpm10
            target: dev
            build-args: |
              PHP_VERSION=8.4
              NODE_MAJOR=24
              PNPM_VERSION=latest-10
            cache-scope: dev-php8.4-node24-pnpm10
            tags: |
              type=raw,value=php8.4-node24-pnpm10-dev

          - name: dev-php8.4-node24-pnpm11
            target: dev
            build-args: |
              PHP_VERSION=8.4
              NODE_MAJOR=24
              PNPM_VERSION=latest-11
            cache-scope: dev-php8.4-node24-pnpm11
            tags: |
              type=raw,value=php8.4-node24-pnpm11-dev
              type=raw,value=php8.4-node24-dev
              type=raw,value=php8.4-dev

          - name: dev-php8.4-node26-pnpm10
            target: dev
            build-args: |
              PHP_VERSION=8.4
              NODE_MAJOR=26
              PNPM_VERSION=latest-10
            cache-scope: dev-php8.4-node26-pnpm10
            tags: |
              type=raw,value=php8.4-node26-pnpm10-dev

          - name: dev-php8.4-node26-pnpm11
            target: dev
            build-args: |
              PHP_VERSION=8.4
              NODE_MAJOR=26
              PNPM_VERSION=latest-11
            cache-scope: dev-php8.4-node26-pnpm11
            tags: |
              type=raw,value=php8.4-node26-pnpm11-dev
              type=raw,value=php8.4-node26-dev

          # Development PHP 8.5
          - name: dev-php8.5-node24-pnpm10
            target: dev
            build-args: |
              PHP_VERSION=8.5
              NODE_MAJOR=24
              PNPM_VERSION=latest-10
            cache-scope: dev-php8.5-node24-pnpm10
            tags: |
              type=raw,value=php8.5-node24-pnpm10-dev

          - name: dev-php8.5-node24-pnpm11
            target: dev
            build-args: |
              PHP_VERSION=8.5
              NODE_MAJOR=24
              PNPM_VERSION=latest-11
            cache-scope: dev-php8.5-node24-pnpm11
            tags: |
              type=raw,value=php8.5-node24-pnpm11-dev
              type=raw,value=php8.5-node24-dev
              type=raw,value=php8.5-dev

          - name: dev-php8.5-node26-pnpm10
            target: dev
            build-args: |
              PHP_VERSION=8.5
              NODE_MAJOR=26
              PNPM_VERSION=latest-10
            cache-scope: dev-php8.5-node26-pnpm10
            tags: |
              type=raw,value=php8.5-node26-pnpm10-dev

          - name: dev-php8.5-node26-pnpm11
            target: dev
            build-args: |
              PHP_VERSION=8.5
              NODE_MAJOR=26
              PNPM_VERSION=latest-11
            cache-scope: dev-php8.5-node26-pnpm11
            tags: |
              type=raw,value=php8.5-node26-pnpm11-dev
              type=raw,value=php8.5-node26-dev
              type=raw,value=latest-dev

    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      id-token: write
      packages: write
    with:
      output: image
      push: true
      platforms: linux/amd64,linux/arm64
      target: ${{ matrix.target }}
      build-args: ${{ matrix.build-args }}
      cache: true
      cache-mode: max
      cache-scope: ${{ matrix.cache-scope }}
      meta-images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      meta-tags: ${{ matrix.tags }}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
