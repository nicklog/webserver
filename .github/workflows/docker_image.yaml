name: Create and publish a Docker image

on:
  push:
    branches:
      - 'main'
  schedule:
    - cron: '0 3 * * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php_version: [8.2, 8.3, 8.4, 8.5]
        node_major: [22, 24]
        pnpm_version: [10, 11]
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate tags
        id: gen-tags
        run: |
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          PHP="${{ matrix.php_version }}"
          NODE="${{ matrix.node_major }}"
          PNPM="${{ matrix.pnpm_version }}"

          {
            echo "tags<<EOF"
            echo "${IMG}:php${PHP}-node${NODE}-pnpm${PNPM}"
            if [ "$PNPM" = "11" ]; then
              echo "${IMG}:php${PHP}-node${NODE}"
            fi
            if [ "$NODE" = "24" ] && [ "$PNPM" = "11" ]; then
              echo "${IMG}:php${PHP}"
            fi
            if [ "$PHP" = "8.5" ] && [ "$NODE" = "24" ] && [ "$PNPM" = "11" ]; then
              echo "${IMG}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Tags to apply:"
          echo "  ${IMG}:php${PHP}-node${NODE}-pnpm${PNPM}"
          if [ "$PNPM" = "11" ]; then
            echo "  ${IMG}:php${PHP}-node${NODE}"
          fi
          if [ "$NODE" = "24" ] && [ "$PNPM" = "11" ]; then
            echo "  ${IMG}:php${PHP}"
          fi
          if [ "$PHP" = "8.5" ] && [ "$NODE" = "24" ] && [ "$PNPM" = "11" ]; then
            echo "  ${IMG}:latest"
          fi

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ startsWith(github.ref, 'refs/tags/') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          tags: ${{ steps.gen-tags.outputs.tags }}
          build-args: |
            PHP_VERSION=${{ matrix.php_version }}
            NODE_MAJOR=${{ matrix.node_major }}
            PNPM_VERSION=latest-${{ matrix.pnpm_version }}
          cache-from: type=gha,scope=php${{ matrix.php_version }}-node${{ matrix.node_major }}-pnpm${{ matrix.pnpm_version }}
          cache-to: type=gha,mode=max,scope=php${{ matrix.php_version }}-node${{ matrix.node_major }}-pnpm${{ matrix.pnpm_version }}
