; Production hardening
; This file is only included in the prod image target.

; Do not expose PHP version in HTTP headers
expose_php = Off

; Error handling: never display errors to clients, always log them
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php/errors.log

; Assertions must be disabled in production
zend.assertions = -1
assert.active = 0
assert.exception = 0

; OPcache production tuning
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0

; Session security
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = "Strict"
session.use_strict_mode = 1
session.use_only_cookies = 1
